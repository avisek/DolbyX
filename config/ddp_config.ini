[DDP]
; WSL2 distribution name (run 'wsl -l' to see yours)
wsl_distro=Ubuntu

; Path to DolbyX/arm directory inside WSL2
ddp_path=/home/youruser/DolbyX/arm

; Sample rate: 44100 or 48000 (native, no resampling)
sample_rate=48000

; Pre-gain dB (attenuate input to simulate phone volume)
; -6 ≈ 50% volume (recommended). Use -3 for louder, -9 for quieter.
pre_gain_db=-6

; Post-gain dB (boost after DDP). 0 = raw DDP output (recommended).
post_gain_db=0
